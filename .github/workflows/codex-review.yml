name: Codex Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: codex-review-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      !github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - name: Check out PR merge commit
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Pre-fetch base and head refs for the PR
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          prompt: |
            You are reviewing pull request #${{ github.event.pull_request.number }} for ${{ github.repository }}.

            Review only the changes introduced by this pull request.
            Compare the base and head commits with:
              git log --oneline ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}

            Focus on:
            - correctness bugs
            - behavioral regressions
            - missing tests
            - API or compatibility risks

            Keep the review concise and actionable. If there are no findings, say so explicitly.

            Pull request title:
            ${{ github.event.pull_request.title }}

            Pull request body:
            ${{ github.event.pull_request.body }}

  post_review:
    needs: review
    if: needs.review.outputs.final_message != ''
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Post Codex pull request review
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: "COMMENT",
              body: process.env.CODEX_FINAL_MESSAGE,
            });
